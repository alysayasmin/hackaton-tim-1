<script>
  const products = [
    {
      id: 1,
      name: "Meja Jati Minimalis",
      category: "Meja",
      price: 1250000,
      stock: 10,
      desc:"Meja Jati Minimalis menghadirkan perpaduan sempurna antara kekuatan kayu jati murni berdaya tahan tinggi dan estetika modern yang bersih. Didesain dengan garis-garis yang tegas tanpa dekorasi berlebih, meja ini menonjolkan keindahan serat kayu alami yang khas sekaligus memberikan kesan ruangan yang lebih luas, rapi, dan elegan.",
      image: "https://images.unsplash.com/photo-1602872030490-4a484a7b3ba6?q=80&w=2940&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    },
    {
      id: 2,
      name: "Kursi Rotan",
      category: "Kursi",
      price: 850000,
      stock: 110,
      desc:"Kursi kayu dengan kombinasi anyaman rotan tengah menjadi tren utama dalam desain interior modern tropis dan Mid-Century Modern. Perpaduan material rangka kayu jati solid yang kokoh dan kelenturan anyaman rotan alami menciptakan tampilan furnitur yang estetik, ringan, namun tetap berdaya tahan tinggi.",
      image: "https://images.unsplash.com/photo-1603204077067-65ee7573cf3f?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    },
    {
      id: 3,
      name: "Lemari Kayu",
      category: "Lemari",
      price: 2100000,
      stock: 1,
      desc:"Jika Anda memiliki kamar dengan area yang cukup efisien, lemari dengan desain vertikal ramping atau sistem pintu geser adalah solusi terbaik agar tidak memakan ruang saat dibuka.",
      image: "https://images.unsplash.com/photo-1721308897744-c14822f11df9?q=80&w=1740&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    },
    {
      id: 4,
      name: "Lemari Kabinet TV",
      category: "Meja",
      price: 1250000,
      stock: 230,
      desc:"Lemari kabinet TV kayu saat ini tidak hanya berfungsi sebagai penopang televisi, melatingkan juga menjadi pusat estetika ruang keluarga. Tren desain terbaru berfokus pada fleksibilitas ukuran dan efisiensi ruang tanpa mengorbankan tempat penyimpanan.",
      image: "https://images.unsplash.com/photo-1771692826906-dd250a2502c3?q=80&w=2231&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    },
    {
      id: 5,
      name: "Dipan Tidur kayu jati",
      category: "Kursi",
      price: 850000,
      stock: 10,
      desc:"Jika Anda menyukai ranjang tradisional dengan sandaran kepala (headboard) yang kokoh untuk bersandar saat membaca buku atau bermain ponsel sebelum tidur. Dipan tempat tidur kayu jati adalah pilihan investasi furnitur terbaik untuk kamar tidur. Karakteristik kayu jati solid yang terkenal sangat kuat, tahan lama, tidak mudah melengkung, dan secara alami anti-rayap menjadikannya unggul untuk penggunaan jangka panjang hingga puluhan tahun.",
      image: "https://images.unsplash.com/photo-1688384452844-8364c3e2fc28?q=80&w=871&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    },
    {
      id: 6,
      name: "Set Meja Makan 6 kursi",
      category: "Lemari",
      price: 2100000,
      stock: 10,
      desc:"Bentuk persegi panjang sangat cocok ditempatkan di ruang makan yang memanjang, memberikan area penyajian hidangan tengah yang lebih leluasa. Set meja makan dengan 6 kursi merupakan pilihan ideal untuk menjamu keluarga besar atau tamu dengan nyaman. Memilih material berbasis kayu jati solid memastikan kestabilan struktur meja saat menopang banyak hidangan, sekaligus memberikan tampilan ruang makan yang hangat dan berkelas.",
      image: "https://images.unsplash.com/photo-1758977245854-b0ea036e0ce2?q=80&w=1560&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
    }
  ];

  function getCart() {
    return JSON.parse(localStorage.getItem("cartItems")) || [];
  }

  function saveCart(cart) {
    localStorage.setItem("cartItems", JSON.stringify(cart));
  }

  function updateCartBadge() {
    const cart = getCart();
    const total = cart.reduce((sum, item) => sum + item.qty, 0);
    document.getElementById("cartBadge").textContent = total;
  }

  function addToCart(productId) {
  const product = products.find(p => p.id === productId);
  if (!product || product.stock <= 0) return;

  let cart = getCart();

  const existing = cart.find(item => item.id === productId);

  if (existing) {
    existing.qty++;
  } else {
    cart.push({ ...product, qty: 1 });
  }

  // 🔥 KURANGI STOCK
  product.stock--;

  saveCart(cart);
  updateCartBadge();
  renderProducts();

  showSuccess();
}

  function renderProducts() {
     const productGrid = document.getElementById("productGrid");
  const productCount = document.getElementById("product-count");

  productCount.textContent = `${products.length} produk tersedia`;

  productGrid.innerHTML = products.map(product => {

    const isOut = product.stock <= 0;

    return `
      <div class="col-md-4">
        <div class="card h-100 shadow-sm border-0">

          <img src="${product.image}" class="card-img-top"
               style="height:220px; object-fit:cover;">

          <div class="card-body">

            <div class="d-flex justify-content-between align-items-center">
              <h5>${product.name}</h5>

              <!-- ICON INFO -->
              <i class="fa-solid fa-circle-info text-muted"
                style="cursor:pointer;"
                onclick="openDetail(${product.id})">
              </i>
            </div>

            <p class="fw-bold mb-1">
              Rp ${product.price.toLocaleString("id-ID")}
            </p>

            <!-- STOCK -->
            <p class="text-${isOut ? 'danger' : 'success'} mb-3">
              ${isOut ? 'Barang Habis' : 'Stock: ' + product.stock}
            </p>

            <button 
              class="btn ${isOut ? 'btn-secondary' : 'btn-dark'} w-100"
              ${isOut ? 'disabled' : ''}
              onclick="addToCart(${product.id})"
            >
              ${isOut ? 'Barang Habis' : 'Add to Cart'}
            </button>

          </div>
        </div>
      </div>
    `;

  }).join("");

    document.getElementById("product-count").textContent =
      products.length + " produk tersedia";
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderProducts();
    updateCartBadge();
  });

function showSuccess(productName) {
  Swal.fire({
    icon: "success",
    title: productName,
    text: "Berhasil ditambahkan ke keranjang",
    timer: 1500,
    showConfirmButton: false,
    timerProgressBar: true,
    position: "top-end",
    toast: true,
    background: "#fff",
    color: "#333"
  });
}

let selectedProductId = null;

function openDetail(id) {
  const product = products.find(p => p.id === id);
  if (!product) return;

  selectedProductId = id;

  // Isi data ke modal
  document.getElementById("modalImage").src = product.image;
  document.getElementById("modalName").textContent = product.name;
  document.getElementById("modalCategory").textContent = product.category || "-";
  document.getElementById("modalPrice").textContent =
    "Rp " + product.price.toLocaleString("id-ID");
  document.getElementById("modalDesc").textContent = product.desc;
  document.getElementById("modalStock").textContent =
    product.stock > 0 ? "Stock: " + product.stock : "Out of Stock";

  // Disable tombol kalau habis
  const btn = document.getElementById("modalAddBtn");
  if (product.stock <= 0) {
    btn.disabled = true;
    btn.textContent = "Out of Stock";
    btn.classList.replace("btn-dark", "btn-secondary");
  } else {
    btn.disabled = false;
    btn.textContent = "Add to Cart";
    btn.classList.replace("btn-secondary", "btn-dark");
  }

  // Show modal
  const modal = new bootstrap.Modal(document.getElementById("productDetailModal"));
  modal.show();
}

document.getElementById("modalAddBtn").addEventListener("click", function () {
  if (selectedProductId !== null) {
    addToCart(selectedProductId);

    // Tutup modal
    const modalEl = document.getElementById("productDetailModal");
    const modalInstance = bootstrap.Modal.getInstance(modalEl);
    modalInstance.hide();
  }
});
</script>
