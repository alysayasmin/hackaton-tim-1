<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="E-Catalog" />
    <meta
      name="keywords"
      content="furniture, tables, chair, indonesia, jepara"
    />
    <meta name="author" content="Tim 1 - KayuKita" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KayuKita - Cart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="../asset/style/style.css" />
    <link rel="icon" type="images/png" href="../asset/images/favicon.png" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg mx-5">
      <div class="container-fluid">
        <a class="navbar-brand logo-brand" href="../index.html">
          <img
            src="../asset/images/Bigger Logo.png"
            alt="Logo KayuKita"
            width="155"
            height="50"
          />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarSupportedContent"
          aria-controls="navbarSupportedContent"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="./collection.html">Collection</a>
            </li>
          </ul>

          <button type="button" class="btn position-relative" id="cartBtn">
            <i
              class="fa-solid fa-cart-arrow-down"
              style="font-size: 18px; color: #3a2820"
            ></i>
            <span
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
              id="cartBadge"
            >
              0
              <span class="visually-hidden">item di keranjang</span>
            </span>
          </button>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="page-wrap">
      <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2 class="fw-bold mb-0">Keranjang Anda</h2>
          <span class="text-secondary" id="cartCountText">0 items</span>
        </div>

        <div id="cartContainer" class="row g-4">
          <!-- isi cart akan dirender di sini -->
        </div>

        <div class="d-flex justify-content-between align-items-center mt-4">
          <div>
            <h5 class="mb-0">Total Belanja</h5>
            <h5 class="fw-bold mb-0" id="cartTotal">Rp 0</h5>
          </div>

            <button class="btn btn-dark px-5 py-3 rounded-3 fw-semibold" onclick="openOrderModal()">
                Pesan Sekarang
            </button>

        </div>
      </div>
    </div>

    <div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Pesan Sekarang</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nama</label>
          <input type="text" id="orderName" class="form-control" placeholder="Masukkan nama kamu">
        </div>

        <div class="mb-3">
          <label class="form-label">Alamat</label>
          <textarea id="orderAddress" class="form-control" rows="3" placeholder="Masukkan alamat lengkap"></textarea>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Ringkasan Pesanan</label>
          <div id="orderSummary" class="border rounded p-3 bg-light"></div>
        </div>

        <div class="d-flex justify-content-between align-items-center">
          <span class="fw-semibold">Total belanja</span>
          <span class="fw-bold" id="orderGrandTotal">Rp 0</span>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-dark w-100" onclick="payNow()">Bayar Sekarang</button>
      </div>
    </div>
  </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
  function getCart() {
    return JSON.parse(localStorage.getItem("cartItems")) || [];
  }

  function saveCart(cart) {
    localStorage.setItem("cartItems", JSON.stringify(cart));
  }

  function formatRupiah(num) {
    return "Rp " + num.toLocaleString("id-ID");
  }

  function updateCartBadge() {
    const cart = getCart();
    const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

    const badge = document.getElementById("cartBadge");
    const countText = document.getElementById("cartCountText");

    if (badge) badge.textContent = totalQty;
    if (countText) countText.textContent = totalQty + " items";
  }

  function changeQty(index, change) {
    const cart = getCart();

    cart[index].qty += change;

    if (cart[index].qty <= 0) {
      cart.splice(index, 1);
    }

    saveCart(cart);
    renderCart();
  }

  function confirmDelete(index) {
    Swal.fire({
      title: "Apakah anda yakin?",
      text: "Barang ini akan dihapus dari keranjang.",
      icon: "warning",
      showCancelButton: true,
      confirmButtonText: "Yes",
      cancelButtonText: "No",
      reverseButtons: true
    }).then((result) => {
      if (result.isConfirmed) {
        const cart = getCart();
        cart.splice(index, 1);
        saveCart(cart);
        renderCart();

        Swal.fire({
          icon: "success",
          title: "Barang berhasil dihapus",
          showConfirmButton: false,
          timer: 1400
        });
      }
    });
  }

  function openOrderModal() {
    const cart = getCart();

    if (cart.length === 0) {
      Swal.fire({
        icon: "info",
        title: "Keranjang masih kosong",
        text: "Silakan tambahkan barang terlebih dahulu."
      });
      return;
    }

    const summaryEl = document.getElementById("orderSummary");
    const totalEl = document.getElementById("orderGrandTotal");

    let grandTotal = 0;

    summaryEl.innerHTML = cart.map((item) => {
      const subtotal = item.price * item.qty;
      grandTotal += subtotal;

      return `
        <div class="d-flex justify-content-between align-items-start mb-2">
          <div>
            <div class="fw-semibold">${item.name}</div>
            <small class="text-muted">Qty: ${item.qty}</small>
          </div>
          <div class="fw-semibold">${formatRupiah(subtotal)}</div>
        </div>
      `;
    }).join("");

    totalEl.textContent = formatRupiah(grandTotal);

    document.getElementById("orderName").value = "";
    document.getElementById("orderAddress").value = "";

    const modal = new bootstrap.Modal(document.getElementById("orderModal"));
    modal.show();
  }

  function payNow() {
    const name = document.getElementById("orderName").value.trim();
    const address = document.getElementById("orderAddress").value.trim();
    const cart = getCart();

    if (!cart.length) {
      Swal.fire({
        icon: "info",
        title: "Keranjang masih kosong"
      });
      return;
    }

    if (!name || !address) {
      Swal.fire({
        icon: "warning",
        title: "Lengkapi data dulu",
        text: "Name dan alamat wajib diisi."
      });
      return;
    }

    const modalEl = document.getElementById("orderModal");
    const modalInstance = bootstrap.Modal.getInstance(modalEl);
    if (modalInstance) modalInstance.hide();

    localStorage.removeItem("cartItems");
    renderCart();

    Swal.fire({
      icon: "success",
      title: "Terima kasih telah berbelanja",
      text: "Pesanan kamu berhasil diproses.",
      showConfirmButton: false,
      timer: 2000,
      showClass: {
        popup: "animate__animated animate__zoomIn"
      },
      hideClass: {
        popup: "animate__animated animate__zoomOut"
      }
    });
  }

  function renderCart() {
    const cart = getCart();
    const container = document.getElementById("cartContainer");
    const totalEl = document.getElementById("cartTotal");

    if (!cart.length) {
      container.innerHTML = `
        <div class="col-12">
          <div class="alert alert-secondary text-center mb-0">
            Keranjang masih kosong
          </div>
        </div>
      `;
      totalEl.textContent = "Rp 0";
      updateCartBadge();
      return;
    }

    let total = 0;

    container.innerHTML = cart.map((item, index) => {
      const subtotal = item.price * item.qty;
      total += subtotal;

      return `
        <div class="col-12">
          <div class="card shadow-sm border-0">
            <div class="row g-0 align-items-center">
              <div class="col-md-3">
                <img
                  src="${item.image}"
                  class="img-fluid rounded-start"
                  alt="${item.name}"
                  style="height: 180px; width: 100%; object-fit: cover;"
                >
              </div>

              <div class="col-md-9">
                <div class="card-body">
                  <h5 class="card-title mb-1">${item.name}</h5>
                  <p class="text-muted mb-1">${item.category || "-"}</p>
                  <p class="mb-2">${formatRupiah(item.price)}</p>

                  <div class="d-flex align-items-center gap-2 mb-3">
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeQty(${index}, -1)">-</button>
                    <span class="fw-semibold">${item.qty}</span>
                    <button class="btn btn-outline-secondary btn-sm" onclick="changeQty(${index}, 1)">+</button>
                  </div>

                  <p class="fw-bold mb-3">Subtotal: ${formatRupiah(subtotal)}</p>

                  <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-danger btn-sm" onclick="confirmDelete(${index})">
                      Delete
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      `;
    }).join("");

    totalEl.textContent = formatRupiah(total);
    updateCartBadge();
  }

  document.addEventListener("DOMContentLoaded", () => {
    renderCart();
    updateCartBadge();
  });
</script>
  </body>
</html>
